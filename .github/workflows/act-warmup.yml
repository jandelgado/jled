---
# Seeds the PlatformIO cache (one download per board) before the examples matrix runs.
# Triggered by test.yml via workflow_call, and locally by `make ci-warmup` via act.
on:
  workflow_dispatch:
  workflow_call:
name: act warmup
jobs:
  warmup:
    runs-on: ubuntu-24.04
    continue-on-error: true
    strategy:
      fail-fast: false
      # run cache warmup sequentially to avoid concurrency problems with the pio-cache
      max-parallel: 1
      matrix:
        include:
          - board: uno
            example: hello
          - board: esp01
            example: hello
          - board: nano33ble
            example: hello
          - board: esp32dev
            example: hello
            extra_flags: --project-option="build_flags = -DLED_BUILTIN=1"
          - board: rpipico
            example: hello
            extra_flags: --project-option="board_build.core = earlephilhower"
          - board: nucleo_f401re
            example: multiled_mbed
            extra_flags: --project-option="framework=mbed"
            ext: cpp
    steps:
      - name: checkout code
        uses: actions/checkout@v6
      - uses: ./.github/actions/setup-pio-board
        id: setup
        with:
          board: ${{ matrix.board }}
      - name: build example
        if: steps.setup.outputs.cache-hit != 'true'
        run: |
          EXT=${{ matrix.ext || 'ino' }}
          pio ci --board="${{ matrix.board }}" \
              --lib="src" \
              ${{ matrix.extra_flags }} \
              "examples/${{ matrix.example }}/${{ matrix.example }}.${EXT}"
